version: 2

sources:
  - name: expense_tracker
    database: postgres
    schema: public
    tables:
      - name: transactions
        description: "Raw expense/income/saving transactions"
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: amount
            tests:
              - not_null
          - name: transaction_date
            tests:
              - not_null
          - name: category_id
            tests:
              - not_null
              - relationships:
                  to: source('expense_tracker', 'categories')
                  field: id

      - name: categories
        description: "Transaction categories (expense, income, saving)"
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: name
            tests:
              - unique
              - not_null

      - name: monthly_budgets
        description: "Monthly budget targets per category"

      - name: savings_goals
        description: "Savings goals with targets and progress"

models:
  - name: stg_transactions
    description: "Cleaned transactions with AEST date conversion and time dimensions"
    columns:
      - name: id
        tests:
          - unique
          - not_null

  - name: stg_categories
    description: "Cleaned categories dimension"
    columns:
      - name: category_id
        tests:
          - unique
          - not_null
